<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEP - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/sigep-styles.css">
    <style>
        .pregnancy-icon {
            font-size: 4rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-img">
                    <span class="pregnancy-icon">🤰</span>
                </div>
                <h1 style="color: var(--purple-primary); margin-bottom: 0.5rem;">SIGEP</h1>
                <p style="color: var(--gray-600);">Sistema Integral de Gestión Prenatal</p>
            </div>

            <form action="dashboard.html" method="get">
                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="usuario@sigep.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--gray-600);">
                        <input type="checkbox" style="width: auto;">
                        Recordarme
                    </label>
                    <a href="#" style="color: var(--purple-primary); text-decoration: none; font-size: 0.875rem;">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="justify-content: center;">
                    Iniciar Sesión
                </button>
            </form>

            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--gray-200);">
                <p style="text-align: center; font-size: 0.875rem; color: var(--gray-600);">
                    <strong>Usuarios de Prueba:</strong>
                </p>
                <div style="margin-top: 1rem; font-size: 0.75rem; color: var(--gray-500);">
                    <p>📋 Trabajo Social: trabajo.social@sigep.com</p>
                    <p>👨‍⚕️ Médico: medico@sigep.com</p>
                    <p>👩‍⚕️ Enfermera: enfermera@sigep.com</p>
                    <p>👔 Director: director@sigep.com</p>
                    <p style="margin-top: 0.5rem; font-style: italic;">Contraseña: 123456</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
